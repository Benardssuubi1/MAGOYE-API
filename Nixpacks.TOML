[phases.setup]
nixPkgs = ["python3", "python3Packages.pip", "python3Packages.virtualenv", "gcc"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install gunicorn flask flask-cors psycopg2-binary"
]

[start]
cmd = "/opt/venv/bin/gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
